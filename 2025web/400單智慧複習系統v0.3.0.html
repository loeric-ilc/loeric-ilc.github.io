        const App = () => {

            const [quizData, setQuizData] = useState([]);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [quizScore, setQuizScore] = useState(0);
            const [quizFeedback, setQuizFeedback] = useState(null); 
            const [userAnswer, setUserAnswer] = useState('');
            const [quizStartTime, setQuizStartTime] = useState(null);

            const [selectedHistory, setSelectedHistory] = useState(null);

            // Load Data & History
            useEffect(() => {
                const savedData = localStorage.getItem('vocabApp_data_v1');
                if (savedData) {
                    try {
                        const parsed = JSON.parse(savedData);
                        const merged = INITIAL_WORDS.map(initWord => {
                            const savedWord = parsed.find(p => p.id === initWord.id);

                                slipped: savedWord.slipped || false

                        });

                    } catch (e) { console.error("Load words error", e); }
                }

                const savedHistory = localStorage.getItem('vocabApp_history_v1');
                if (savedHistory) {
                    try {
                        setHistory(JSON.parse(savedHistory));
                    } catch (e) { console.error("Load history error", e); }

            }, []);

            // Save Data
            useEffect(() => {
                localStorage.setItem('vocabApp_data_v1', JSON.stringify(words));
            }, [words]);

            // Save History
            useEffect(() => {
                localStorage.setItem('vocabApp_history_v1', JSON.stringify(history));
            }, [history]);

            // Icons
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            // --- History Management Functions ---

            const importData = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (importedData.stats && importedData.history) {
                            if(confirm("確定要匯入此紀錄嗎？這將覆蓋目前的學習進度。")) {
                                const mergedWords = INITIAL_WORDS.map(initWord => {
                                    const importedWord = importedData.stats.find(p => p.id === initWord.id);
                                    return importedWord ? { 
                                        ...initWord, 
                                        reviewed: importedWord.reviewed, 
                                        errors: importedWord.errors,
                                        slipped: importedWord.slipped || false 
                                    } : initWord;
                                });
                                setWords(mergedWords);
                                setHistory(importedData.history);
                                alert("匯入成功！");
                            }
                        } else {
                            alert("檔案格式錯誤：找不到必要的數據欄位。");
                        }
                    } catch (error) {
                        console.error("Import error:", error);
                        alert("匯入失敗：檔案格式無效。");
                    }
                };
                reader.readAsText(file);
                event.target.value = null; 
            };

            const deleteHistoryItem = (recordId) => {
                if(!confirm("確定要刪除這筆測驗記錄嗎？相關的複習與錯誤次數將會自動扣除。")) return;

                const recordToDelete = history.find(r => r.id === recordId);
                if (!recordToDelete) return;

                const newWords = [...words];
                recordToDelete.details.forEach(detail => {
                    const wordIndex = newWords.findIndex(w => w.id === detail.id);
                    if (wordIndex !== -1) {
                        newWords[wordIndex].reviewed = Math.max(0, newWords[wordIndex].reviewed - 1);
                        if (!detail.isCorrect) {
                            newWords[wordIndex].errors = Math.max(0, newWords[wordIndex].errors - 1);
                        }
                    }
                });

                const newHistory = history.filter(r => r.id !== recordId);
                setWords(newWords);
                setHistory(newHistory);
            };

            const clearAllHistory = () => {
                if(!confirm("⚠️ 警告：確定要清空所有歷程嗎？\n\n這將會：\n1. 刪除所有測驗記錄\n2. 重置所有單字的複習與錯誤次數\n\n此動作無法復原。")) return;
                
                setHistory([]);
                const resetWords = words.map(w => ({ ...w, reviewed: 0, errors: 0, slipped: false }));
                setWords(resetWords);
            };

            // --- Redemption Logic ---
            const handleRedemptionSuccess = (wordId) => {
                const newWords = words.map(w => {
                    if (w.id === wordId) {
                        const newErrors = Math.max(0, w.errors - 1);
                        return {
                            ...w,
                            errors: newErrors,
                            // If errors drop to 0, mark as slipped (previously wrong but redeemed)
                            slipped: newErrors === 0 ? true : w.slipped
                        };
                    }
                    return w;
                });
                setWords(newWords);
                setRedemptionTarget(null);
                alert("🎉 挑戰成功！錯誤次數已扣除。");
            };

            // --- Game Logic ---

            const startQuiz = (mode) => {
                let selection = [];
                const poolSize = 25;

                if (mode === 'random') {
                    const unreviewed = words.filter(w => w.reviewed === 0);
                    const reviewed = words.filter(w => w.reviewed > 0);
                    
                    const shuffledUnreviewed = [...unreviewed].sort(() => 0.5 - Math.random());
                    const shuffledReviewed = [...reviewed].sort(() => 0.5 - Math.random());
                    
                    selection = [...shuffledUnreviewed, ...shuffledReviewed].slice(0, poolSize);
                    
                } else if (mode === 'smart') {
                    // Logic Updated:
                    // 1. All current errors (priority 1)
                    const currentErrors = words.filter(w => w.errors > 0);
                    const shuffledCurrentErrors = [...currentErrors].sort(() => 0.5 - Math.random());
                    
                    // 2. Queue of slipped (past errors), take 3~5 randomly
                    const slippedWords = words.filter(w => w.slipped && w.errors === 0);
                    const shuffledSlipped = [...slippedWords].sort(() => 0.5 - Math.random());
                    const countFromPast = Math.floor(Math.random() * 3) + 3; // 3 to 5
                    const selectedSlipped = shuffledSlipped.slice(0, countFromPast);

                    // 3. Unreviewed words (priority 3)
                    const unreviewedWords = words.filter(w => w.reviewed === 0);
                    const shuffledUnreviewed = [...unreviewedWords].sort(() => 0.5 - Math.random());

                    // 4. Fillers (reviewed but no error)
                    const otherWords = words.filter(w => w.reviewed > 0 && w.errors === 0 && !w.slipped);
                    const shuffledOthers = [...otherWords].sort(() => 0.5 - Math.random());

                    // Build selection list strictly by priority
                    let selectedList = [
                        ...shuffledCurrentErrors,
                        ...selectedSlipped
                    ];

                    // Remove potential duplicates (though sets should be disjoint)
                    selectedList = Array.from(new Set(selectedList.map(w => w.id)))
                        .map(id => words.find(w => w.id === id));

                    // Calculate remaining slots for unreviewed words
                    let remainingCount = poolSize - selectedList.length;

                    if (remainingCount > 0) {
                        const unreviewedToAdd = shuffledUnreviewed.slice(0, remainingCount);
                        selectedList = [...selectedList, ...unreviewedToAdd];
                        
                        // Recalculate for fillers
                        remainingCount = poolSize - selectedList.length;
                    }

                    if (remainingCount > 0) {
                        const othersToAdd = shuffledOthers.slice(0, remainingCount);
                        selectedList = [...selectedList, ...othersToAdd];
                    }

                    // Final shuffle so the quiz order isn't predictable (e.g. always errors first)
                    selection = selectedList.sort(() => 0.5 - Math.random());
                }

                setQuizData(selection);
                setCurrentQIndex(0);
                setQuizScore(0);
                setQuizFeedback(null);
                setUserAnswer('');
                
                sessionResultsRef.current = [];
                
                setQuizStartTime(Date.now());
                setView('quiz');
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (quizFeedback) return;

                const currentWord = quizData[currentQIndex];
                const cleanUserAnswer = userAnswer.trim().toLowerCase();
                const cleanCorrectAnswer = currentWord.en.toLowerCase();
                const isCorrect = cleanUserAnswer === cleanCorrectAnswer;

                const resultEntry = {
                    ...currentWord,
                    isCorrect: isCorrect,
                    userAnswer: userAnswer
                };
                sessionResultsRef.current.push(resultEntry);

                const updatedWords = words.map(w => {
                    if (w.id === currentWord.id) {
                        return {
                            ...w,
                            reviewed: w.reviewed + 1,
                            errors: isCorrect ? w.errors : w.errors + 1
                        };
                    }
                    return w;
                });
                setWords(updatedWords);

                if (isCorrect) {
                    setQuizScore(prev => prev + 1);
                    setQuizFeedback('correct');
                    setTimeout(nextQuestion, 800);
                } else {
                    setQuizFeedback('wrong');
                    setTimeout(nextQuestion, 2500);
                }
            };

            const nextQuestion = () => {
                setQuizFeedback(null);
                setUserAnswer('');
                if (currentQIndex < quizData.length - 1) {
                    setCurrentQIndex(prev => prev + 1);
                } else {
                    finishQuiz();
                }
            };

            const finishQuiz = () => {
                const endTime = Date.now();
                const duration = Math.floor((endTime - quizStartTime) / 1000); 
                
                const finalResults = [...sessionResultsRef.current];
                const finalScore = finalResults.filter(r => r.isCorrect).length;

                const newRecord = {
                    id: endTime,
                    timestamp: endTime,
                    duration: duration,
                    score: finalScore, 
                    total: quizData.length,
                    details: finalResults
                };

                setHistory(prev => [newRecord, ...prev]);
                setView('result');
            };

            const exportJSON = () => {
                const formatStats = (list) => {
                    if (!list || list.length === 0) return "[]";
                    const items = list.map(item => `    ${JSON.stringify(item)}`);
                    return `[\n${items.join(",\n")}\n  ]`;
                };

                const formatHistory = (list) => {
                    if (!list || list.length === 0) return "[]";
                    const items = list.map(record => {
                        const detailsItems = record.details.map(d => {
                            const { reviewed, errors, slipped, ...keep } = d; // Filter out tracking props
                            return `        ${JSON.stringify(keep)}`;
                        });
                        const detailsStr = `[\n${detailsItems.join(",\n")}\n      ]`;
                        return `    {
    "id": ${record.id}, "timestamp": ${record.timestamp}, "duration": ${record.duration}, "score": ${record.score}, "total": ${record.total},  "details": ${detailsStr}
    }`;
                    });
                    return `[\n${items.join(",\n")}\n  ]`;
                };

                const jsonString = `{\n  "stats": ${formatStats(words)},\n  "history": ${formatHistory(history)}\n}`;

                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(jsonString);
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "vocab_full_data.json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const openHistoryDetail = (record) => {
                setSelectedHistory(record);
                setView('historyDetail');
            };

            return (
                <div className="min-h-screen bg-gray-100">
                    {view === 'menu' && (
                        <MenuScreen 
                            startQuiz={startQuiz} 
                            setView={setView} 
                            exportJSON={exportJSON} 
                            words={words} 
                            history={history} 
                            importData={importData}
                        />
                    )}
                    {view === 'quiz' && (
                        <QuizScreen 
                            quizData={quizData}
                            currentQIndex={currentQIndex}
                            quizScore={quizScore}
                            quizFeedback={quizFeedback}
                            userAnswer={userAnswer}
                            setUserAnswer={setUserAnswer}
                            handleSubmit={handleSubmit}
                            setView={setView}
                            quizStartTime={quizStartTime}
                        />
                    )}
                    {view === 'result' && (
                        <ResultScreen 
                            quizScore={quizScore} 
                            totalQuestions={quizData.length} 
                            setView={setView} 
                        />
                    )}
                    {view === 'summary' && (
                        <SummaryScreen 
                            setView={setView} 
                            exportJSON={exportJSON} 
                            words={words} 
                            history={history} 
                            openHistoryDetail={openHistoryDetail} 
                            activeTab={summaryTab}
                            setActiveTab={setSummaryTab}
                            deleteHistoryItem={deleteHistoryItem}
                            clearAllHistory={clearAllHistory}
                            startRedemption={(word) => setRedemptionTarget(word)}
                        />
                    )}
                    {view === 'historyDetail' && (
                        <HistoryDetailScreen 
                            selectedHistory={selectedHistory} 
                            setView={setView} 
                            exportJSON={exportJSON}
                        />
                    )}

                    {/* Redemption Modal Layer */}
                    {redemptionTarget && (
                        <RedemptionModal 
                            word={redemptionTarget}
                            onClose={() => setRedemptionTarget(null)}
                            onRedeem={handleRedemptionSuccess}
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
