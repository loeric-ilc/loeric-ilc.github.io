<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 互動遊戲學習入口網</title>
    <style>
        :root {
            --primary-color: #6a11cb;
            --secondary-color: #2575fc;
            --accent-color: #ff9a9e;
            --text-color: #333;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
            position: relative; /* For absolute positioning of the menu */
        }

        /* --- New Dropdown Menu Styles --- */
        .top-tools {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .dropdown {
            position: relative;
            display: inline-block;
            padding-bottom: 5px; 
        }

        .dropbtn {
            background-color: rgba(255, 255, 255, 0.25);
            color: white;
            padding: 10px 20px;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            border-radius: 25px;
            backdrop-filter: blur(4px);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .dropbtn:hover {
            background-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            /* 修改 1: 讓選單貼近按鈕底部，改用 margin 製造視覺距離 */
            top: 100%; 
            margin-top: 10px; /* 視覺上的間距 */
            
            background-color: #ffffff;
            min-width: 180px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
            border-radius: 12px;
            overflow: visible; /* 修改 2: 允許偽元素超出邊界 */
            animation: fadeIn 0.2s ease-in-out;
        }

        /* 修改 3: 新增「隱形橋樑」填補縫隙 */
        .dropdown-content::before {
            content: "";
            position: absolute;
            top: -20px; /* 向上延伸覆蓋縫隙 */
            left: 0;
            width: 100%;
            height: 20px; /* 高度足夠覆蓋 margin-top 的距離 */
            background: transparent; /* 透明 */
            display: block;
        }

        .dropdown-content a {
            color: var(--text-color);
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 0.9rem;
            transition: background 0.2s;
            border-bottom: 1px solid #f0f0f0;
            position: relative; /* 確保連結在偽元素之上 */
            z-index: 1;
        }

        .dropdown-content a:last-child {
            border-bottom: none;
        }

        .dropdown-content a:hover {
            background-color: #f5f7fa;
            color: var(--secondary-color);
        }

        /* Show dropdown on hover */
        .dropdown:hover .dropdown-content {
            display: block;border-radius: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* -------------------------------- */

        header {
            text-align: center;
            padding: 70px 20px 40px;
            width: 100%;
            background: linear-gradient(120deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 40px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding-bottom: 60px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            position: relative;
            border: 1px solid rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(37, 117, 252, 0.2);
        }

        .card-icon {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }

        .card-body {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            text-align: center;
            background: var(--secondary-color);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--primary-color);
        }

        .card:nth-child(1) .card-icon { background: #e3f2fd; color: #2196f3; }
        .card:nth-child(2) .card-icon { background: #fff3e0; color: #ff9800; }
        .card:nth-child(3) .card-icon { background: #fce4ec; color: #e91e63; }
        .card:nth-child(4) .card-icon { background: #e8f5e9; color: #4caf50; }

        footer {
            margin-top: auto;
            padding: 20px;
            color: #888;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .container { width: 95%; }
            .top-tools { top: 15px; right: 15px; }
        }
    </style>
</head>
